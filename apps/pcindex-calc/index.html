<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cpk Challenge - Clean Numeric</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .challenge { background: linear-gradient(135deg, #f0f8ff, #e3f2fd); padding: 25px; border-radius: 15px; margin: 20px 0; box-shadow: 0 4px 12px rgba(0,123,255,0.1); }
        input { width: 120px; padding: 10px; margin: 8px; border-radius: 8px; border: 2px solid #ddd; font-size: 16px; }
        button { padding: 12px 24px; background: linear-gradient(135deg, #007bff, #0056b3); color: white; border: none; border-radius: 8px; cursor: pointer; margin: 5px; font-weight: bold; transition: all 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,123,255,0.3); }
        .feedback { font-weight: bold; margin: 15px 0; padding: 12px; border-radius: 8px; }
        .correct { color: #28a745; background: #d4edda; }
        .incorrect { color: #dc3545; background: #f8d7da; }
        .formula { background: linear-gradient(135deg, #e7f3ff, #d1ecf1); padding: 25px; border-left: 6px solid #007bff; margin: 20px 0; border-radius: 12px; text-align: center; }
        .section { margin-bottom: 25px; }
        h1, h3 { color: #007bff; }
        .params { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    </style>
    <!-- MathJax for continuous LaTeX -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$']] },
            chtml: { scale: 1.1 }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <h1>🧮 Process Capability Index (Cpk) Challenge</h1>
    
    <div class="section">
        <p>Calculate Cpk: $$ Cpk = \min\left( \frac{USL - \mu}{3\sigma}, \frac{\mu - LSL}{3\sigma} \right) $$. Round to 2 decimals.</p>
    </div>

    <div id="app">
        <button onclick="generateValues()">🔄 New Challenge</button>
        <div id="values" class="challenge"></div>
        
        <div class="section">
            <label>Enter Cpk: <input type="number" id="userCpk" step="0.01" placeholder="1.23"></label>
            <button onclick="checkAnswer()">✅ Check Answer</button>
            <div id="feedback" class="feedback"></div>
        </div>

        <div id="solution" style="display: none;" class="formula"></div>
    </div>

    <script>
        let current = { mu: 0, sigma: 0, usl: 0, lsl: 0, cpk: 0 };

        async function renderMath() {
            await MathJax.typesetPromise();
        }

        async function generateValues() {
            current.mu = (Math.random() * 50 + 50).toFixed(2);
            current.sigma = (Math.random() * 8 + 2).toFixed(2);
            current.usl = (parseFloat(current.mu) + Math.random() * 15 + 15).toFixed(2);
            current.lsl = (parseFloat(current.mu) - Math.random() * 15 - 15).toFixed(2);
            
            const cpu = (parseFloat(current.usl) - parseFloat(current.mu)) / (3 * parseFloat(current.sigma));
            const cpl = (parseFloat(current.mu) - parseFloat(current.lsl)) / (3 * parseFloat(current.sigma));
            current.cpk = Math.min(cpu, cpl).toFixed(2);
            
            document.getElementById('values').innerHTML = `
                <h3>📊 Process Parameters</h3>
                <div class="params">
                    <p>\\( \\mu = ${current.mu} \\)</p>
                    <p>\\( \\sigma = ${current.sigma} \\)</p>
                    <p>\\( \\text{USL} = ${current.usl} \\)</p>
                    <p>\\( \\text{LSL} = ${current.lsl} \\)</p>
                </div>
            `;
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('solution').style.display = 'none';
            document.getElementById('userCpk').value = '';
            await renderMath();
        }

        async function checkAnswer() {
            const user = parseFloat(document.getElementById('userCpk').value || 0);
            const fb = document.getElementById('feedback');
            if (Math.abs(user - parseFloat(current.cpk)) <= 0.01) {
                fb.innerHTML = '✅ <strong>Correct!</strong> Great job on Cpk calculation. 🎉';
                fb.className = 'feedback correct';
            } else {
                fb.innerHTML = `❌ Incorrect. Correct Cpk = <strong>${current.cpk}</strong>. Try again!`;
                fb.className = 'feedback incorrect';
            }
            await showSolution();
        }

        async function showSolution() {
            const cpu = ((parseFloat(current.usl) - parseFloat(current.mu)) / (3 * parseFloat(current.sigma))).toFixed(2);
            const cpl = ((parseFloat(current.mu) - parseFloat(current.lsl)) / (3 * parseFloat(current.sigma))).toFixed(2);
            document.getElementById('solution').innerHTML = `
                <h4>💡 Step-by-Step Solution</h4>
                <p>$$ CPU = \\frac{\\text{USL} - \\mu}{3\\sigma} = \\frac{${current.usl} - ${current.mu}}{3 \\times ${current.sigma}} = ${cpu} $$</p>
                <p>$$ CPL = \\frac{\\mu - \\text{LSL}}{3\\sigma} = \\frac{${current.mu} - ${current.lsl}}{3 \\times ${current.sigma}} = ${cpl} $$</p>
                <p>$$ Cpk = \\min(${cpu}, ${cpl}) = ${current.cpk} $$</p>
            `;
            document.getElementById('solution').style.display = 'block';
            await renderMath();
        }

        // Initial load
        generateValues();
    </script>
</body>
</html>
